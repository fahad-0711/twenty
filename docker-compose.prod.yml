version: '3.8'

services:
  twenty-server:
    build: ./packages/twenty-server
    restart: always
    env_file: .env.production
    depends_on:
      - postgres
      - redis
    networks:
      - calllive-net

  twenty-front:
    build: ./packages/twenty-front
    restart: always
    networks:
      - calllive-net

  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: twenty
      POSTGRES_PASSWORD: twenty_password
      POSTGRES_DB: calllive_crm
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - calllive-net

  redis:
    image: redis:7-alpine
    restart: always
    networks:
      - calllive-net

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/crm.conf:/etc/nginx/conf.d/default.conf
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - twenty-server
      - twenty-front
    networks:
      - calllive-net

volumes:
  postgres_data:

networks:
  calllive-net:
